<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelanncer portfolio</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>

    <div class="grid">
        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-list__item"><a href="./index.html"class="nav-list__link"><strong>Freelancer</strong> portfolio</a></li>
                <li class="nav-list__item"><a href="./index.html"class="nav-list__link nav-list__link--active">Projects</a></li>
                <li class="nav-list__item"><a href="./index.html"class="nav-list__link">Skills</a></li>
                <li class="nav-list__item"><a href="./index.html"class="nav-list__link">Contacts</a></li>
                <li class="nav-list__item">
                    <button class="dark-mode-btn ">
                        <img src="./img/icons/sun.svg" alt="light mode" class="dark-mode-btn__icon">
                        <img src="./img/icons/moon.svg" alt="dark mode" class="dark-mode-btn__icon">
                        <img src="./img/icons/stars.svg" alt="stars" class="dark-mode-btn__icon dark-mode-btn--stars">
                    </button>
                </li>
            </ul>
        </nav>

        <main class="main-container">

            <div class="main-container-wraper-project">
                <h2>Video service</h2>
            
                <div class="main-wraper-video-service">
                    <img src="./img/sample.jpeg" alt="video-service" class="main-wraper-video-service__img">
                </div>
                
                <h3>Skills: Html, Css, Js, Angular</h3>

                <a href="#!" class="btn-gitHub-repo">
                    <img src="./img/icons/gitHub-black.svg" alt="gitHub-back" class="btn-gitHub-repo__img">
                    <p class="btn-gitHub-repo__text">GitHub repo</p>
                </a>
            </div>
            
        </main>
        
        <footer class="footer-container">
            <div class="footer-wraper">

                    <ul class="footer-item__links">
                        
                        <li class="footer__link__whatsapp">
                            <a href="#">
                                <img src="./img/icons/whatsapp.svg" alt="whatsapp">
                            </a>
                        </li>

                        <li class="footer__link__instagram">
                            <a href="#">
                                <img src="./img/icons/instagram.svg" alt="instagram">
                            </a>
                        </li>

                        <li class="footer__link__twitter">
                            <a href="#">
                                <img src="./img/icons/twitter.svg" alt="instagram">
                            </a>
                        </li>

                        <li class="footer__link__linkedin">
                            <a href="#">
                                <img src="./img/icons/linkedIn.svg" alt="instagram">
                            </a>
                        </li>

                        <li class="footer__link__gitHub">
                            <a href="#">
                                <img src="./img/icons/gitHub.svg" alt="instagram">
                            </a>
                        </li>
                    </ul>

                    <div class="copyright">
                        <p>© Copyright 2023 frontend-dev</p>
                    </div>
            </div>

        </footer>
    </div>
    <script src="./js/main.js"></script>

</html>
